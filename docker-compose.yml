services:
  postgres:
    image: postgres:15
    container_name: postgres_bd
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lab
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spark:
    image: apache/spark:3.5.1
    container_name: spark_bd
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "18080:8080"
      - "7077:7077"
    volumes:
      - ./app:/opt/app

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark_worker_bd
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark:7077"]
    depends_on:
      - spark
    ports:
      - "18081:8081"
    volumes:
      - ./app:/opt/app

  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: clickhouse_bd
    ports:
      - "18123:8123"
      - "19000:9000"

volumes:
  postgres_data:
